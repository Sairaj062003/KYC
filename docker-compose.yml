services:
  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── Next.js Frontend ─────────────────────────────────────
  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    restart: unless-stopped

  # ── Node.js/Express Backend ──────────────────────────────
  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - kyc_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      vector-db:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kyc_db
      POSTGRES_USER: kyc_user
      POSTGRES_PASSWORD: kyc_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc_user -d kyc_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ── Qdrant Vector Database ──────────────────────────────
  vector-db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Ollama LLM Service ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Pull required models on startup
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3 && ollama pull nomic-embed-text && wait"]
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  ollama_models:
  kyc_uploads:
