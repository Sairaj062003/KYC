events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  # Performance: Gzip Compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_proxied any;
  gzip_min_length 1000;

  upstream backend  { server backend:5000; }
  upstream frontend { server frontend:3000; }

  # HTTP Server (Redirect to HTTPS if needed or serve directly)
  server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    client_max_body_size 20M;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; frame-ancestors 'self';";

    # Nginx Health Check
    location /nginx-health {
      access_log off;
      return 200 "healthy\n";
    }

    # Proxy API requests to the Node.js backend
    location /api/ {
      proxy_pass         http://backend/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Proxy all other requests to the Next.js frontend
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # --- SSL Server Template (Uncomment and configure if certificates are added) ---
  # server {
  #   listen 443 ssl http2;
  #   listen [::]:443 ssl http2;
  #   server_name localhost;
  #
  #   ssl_certificate     /etc/nginx/ssl/live/localhost/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/live/localhost/privkey.pem;
  #
  #   # SSL Security settings (Mozilla Modern)
  #   ssl_session_timeout 1d;
  #   ssl_session_cache shared:SSL:10m;
  #   ssl_session_tickets off;
  #   ssl_protocols TLSv1.3;
  #   ssl_prefer_server_ciphers off;
  #
  #   location /api/ {
  #     proxy_pass http://backend/;
  #     # ... (same headers as above)
  #   }
  #
  #   location / {
  #     proxy_pass http://frontend;
  #     # ... (same headers as above)
  #   }
  # }
}
